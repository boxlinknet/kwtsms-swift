name: Tests

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        swift: ['5.9', '5.10', '6.0']
    container:
      image: swift:${{ matrix.swift }}
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build -v
      - name: Run unit tests
        run: swift test --filter "PhoneTests|MessageTests|ApiErrorTests" -v
