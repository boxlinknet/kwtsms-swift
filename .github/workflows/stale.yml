name: Stale Issues and PRs

on:
  schedule:
    - cron: '0 7 * * 1'  # weekly Monday 7am UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed if no further activity occurs within 7 days.
          stale-pr-message: >
            This PR has been automatically marked as stale because it has not had
            recent activity. It will be closed if no further activity occurs within 7 days.
          close-issue-message: 'Closed as stale. Feel free to reopen if still relevant.'
          close-pr-message: 'Closed as stale. Feel free to reopen if still relevant.'
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security
          exempt-pr-labels: pinned,security
